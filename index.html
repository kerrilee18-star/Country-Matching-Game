<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Passport Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Special+Elite&display=swap');

        :root {
            --desk: #4e342e;
            --parchment: #f4f1ea;
            --ink: #1a1a1a;
            --gold: #c5a021;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--desk);
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; touch-action: none;
        }

        /* Initial Audio Unlocker */
        #audio-unlock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--desk); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .header {
            text-align: center; color: var(--parchment);
            border-bottom: 3px solid var(--gold);
            width: 100%; max-width: 800px; padding: 10px 0; margin-bottom: 20px;
        }

        /* Layout - Flags on Left, Names on Right */
        .game-grid {
            display: none; 
            grid-template-columns: 140px 1fr; 
            gap: 30px; width: 100%; max-width: 900px;
            padding: 10px;
        }

        .column { display: flex; flex-direction: column; gap: 12px; }

        /* Draggable Flag Tags */
        .flag-tag {
            width: 120px; height: 80px; 
            background: white; border-radius: 4px;
            border-left: 10px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; cursor: grab; position: relative;
            box-shadow: 4px 6px 12px rgba(0,0,0,0.4);
            z-index: 100; touch-action: none;
        }

        /* Destination Boxes */
        .name-box {
            height: 80px; background: var(--parchment);
            border: 2px solid #dcd7ca; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; color: var(--ink); font-weight: 800;
            position: relative; font-size: 1.5rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .audio-btn {
            background: var(--gold); border: none; width: 50px; height: 50px;
            border-radius: 50%; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; box-shadow: 0 4px 0 #8d7318;
        }

        /* States */
        .name-box.correct { background: #2ecc71; color: white; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .name-box.wrong { background: #e74c3c; color: white; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .lvl-btn {
            background: var(--gold); color: white; border: none;
            padding: 20px 40px; margin: 10px; border-radius: 10px;
            font-size: 1.5rem; cursor: pointer; font-weight: bold;
        }

        #win-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="audio-unlock">
        <h1 style="font-family: 'Special Elite';">READY TO TRAVEL?</h1>
        <button class="lvl-btn" onclick="unlockAudio()">START JOURNEY</button>
        <p>Click to enable game audio</p>
    </div>

    <div id="menu" class="header" style="display:none;">
        <h1 style="font-family: 'Special Elite'; margin: 0;">GLOBAL PASSPORT CONTROL</h1>
        <div id="level-list"></div>
    </div>

    <div class="game-grid" id="board">
        <div class="column" id="flags"></div>
        <div class="column" id="names"></div>
    </div>

    <div id="win-screen">
        <h1 style="color:white; font-size: 3rem;">PASSPORT STAMPED! ✈️</h1>
        <button class="lvl-btn" onclick="location.reload()">NEXT FLIGHT</button>
    </div>

    <script>
        const gameData = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let dragTarget = null, grabX, grabY, winCount = 0;

        // FIXED AUDIO: Browser unlock
        function unlockAudio() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance('Welcome');
            u.volume = 0; // Silent first play to unlock
            window.speechSynthesis.speak(u);
            document.getElementById('audio-unlock').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            createMenu();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function createMenu() {
            const list = document.getElementById('level-list');
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button');
                b.className = 'lvl-btn'; b.innerText = `Level ${i}`;
                b.onclick = () => startLevel(i);
                list.appendChild(b);
            }
        }

        function startLevel(lvl) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('board').style.display = 'grid';
            const items = gameData[lvl];
            
            const flagCol = document.getElementById('flags');
            const nameCol = document.getElementById('names');

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const f = document.createElement('div');
                f.className = 'flag-tag'; f.innerText = d.e; f.dataset.name = d.n;
                f.addEventListener('pointerdown', (e) => onGrab(e, f));
                flagCol.appendChild(f);
            });

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const n = document.createElement('div');
                n.className = 'name-box'; n.dataset.name = d.n;
                n.innerHTML = `<span>${d.n}</span> 
                    <button class="audio-btn" onclick="speak('${d.n}')">🔊</button>`;
                nameCol.appendChild(n);
            });
        }

        function onGrab(e, el) {
            dragTarget = el;
            dragTarget.style.transition = 'none';
            dragTarget.style.zIndex = '500';
            const rect = dragTarget.getBoundingClientRect();
            grabX = e.clientX - rect.left;
            grabY = e.clientY - rect.top;
            
            dragTarget.style.position = 'fixed';
            dragTarget.style.left = (e.clientX - grabX) + 'px';
            dragTarget.style.top = (e.clientY - grabY) + 'px';

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onDrop);
            speak(dragTarget.dataset.name);
        }

        function onMove(e) {
            if(!dragTarget) return;
            dragTarget.style.left = (e.clientX - grabX) + 'px';
            dragTarget.style.top = (e.clientY - grabY) + 'px';
        }

        function onDrop(e) {
            const boxes = document.getElementsByClassName('name-box');
            let matched = false;

            for(let b of boxes) {
                const r = b.getBoundingClientRect();
                if(e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom) {
                    if(b.dataset.name === dragTarget.dataset.name && !b.classList.contains('correct')) {
                        b.classList.add('correct');
                        b.innerHTML = `<span style="font-size:2.5rem">${dragTarget.innerText}</span> <span>${b.dataset.name}</span>`;
                        dragTarget.remove();
                        winCount++;
                        speak("Correct!");
                        matched = true;
                        if(winCount === 8) { confetti(); document.getElementById('win-screen').style.display='flex'; }
                        break;
                    } else if (!b.classList.contains('correct')) {
                        b.classList.add('wrong');
                        setTimeout(() => b.classList.remove('wrong'), 400);
                        speak("No");
                    }
                }
            }

            if(!matched && dragTarget) {
                dragTarget.style.transition = '0.3s';
                dragTarget.style.position = 'relative';
                dragTarget.style.left = '0'; dragTarget.style.top = '0';
            }
            dragTarget = null;
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onDrop);
        }
    </script>
</body>
</html>
