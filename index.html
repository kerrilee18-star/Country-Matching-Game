<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Matching Countries</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Assistant:wght@600;800&display=swap');

        :root {
            --desk: #1a0f0d; 
            --paper-dark: #0d1b2a; 
            --gold: #d4af37;
        }

        /* Essential for full-screen fit */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            margin: 0; padding: 0; background: var(--desk);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--desk) url('https://www.transparenttextures.com/patterns/dark-wood.png');
            display: flex; flex-direction: column; align-items: center;
            touch-action: none; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        /* START SCREEN */
        #unlock-screen {
            position: fixed; inset: 0; background: var(--desk); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* DYNAMIC HEADER - Scales with Screen Height */
        .header-container {
            width: 100%; max-width: 800px; text-align: center; 
            flex-shrink: 0; padding-top: 5px;
        }
        
        h1 { color: white; margin: 2px 0; font-size: clamp(1.2rem, 4vh, 2rem); }

        .instruction-box {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--gold);
            color: #fff; padding: 5px 10px; border-radius: 8px;
            margin: 5px auto; max-width: 500px;
            font-weight: 700; font-size: clamp(0.8rem, 2.5vh, 1.1rem);
            line-height: 1.2;
        }

        #game-stats {
            display: none; width: 100%; max-width: 600px;
            justify-content: space-around; background: rgba(0,0,0,0.5);
            padding: 5px; border-radius: 8px; margin-bottom: 5px;
            color: var(--gold); font-size: clamp(0.9rem, 2.5vh, 1.2rem); font-weight: bold;
        }

        /* ADAPTIVE GAME BOARD */
        #game-board {
            display: none; width: 100%; max-width: 900px;
            height: 70vh; /* Takes up 70% of available height */
            grid-template-columns: 1fr 1.5fr;
            gap: 10px; padding: 5px;
        }

        .col { 
            display: flex; flex-direction: column; 
            justify-content: space-between; height: 100%;
        }

        /* DRAGGABLE UNIT */
        .flag-unit {
            display: flex; align-items: center; gap: 5px;
            height: 11%; width: 100%;
        }

        .flag-card {
            height: 100%; aspect-ratio: 1.4 / 1;
            background: white; border-radius: 6px; border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.5rem, 5vh, 3rem); cursor: grab;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }

        .big-audio-btn {
            height: 80%; aspect-ratio: 1/1; background: var(--gold);
            border-radius: 50%; border: none; color: white;
            font-size: clamp(1rem, 3vh, 1.5rem); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* NAME SLOT */
        .name-slot {
            height: 11%; width: 100%;
            background: var(--paper-dark); border: 2px solid #334155; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.8rem, 3vh, 1.5rem); text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); text-align: center;
        }

        .name-slot.correct { background: #1b4332 !important; border-color: #2d6a4f; }
        .name-slot.wrong { background: #780000; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .btn {
            background: var(--gold); color: white; border: none;
            padding: 10px 25px; border-radius: 8px; font-size: 1.2rem; 
            font-weight: bold; cursor: pointer; font-family: 'Assistant';
        }

        #win-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        /* Portrait Adjustments for Phones */
        @media (max-height: 500px) {
            .header-container { display: none; } /* Hide header on very short landscape phones to save space */
            #game-board { height: 85vh; }
        }
    </style>
</head>
<body>

    <div id="unlock-screen">
        <h1 style="font-size: 3rem;">Matching Countries</h1>
        <h2 style="font-family: 'Assistant';">התאמת מדינות</h2>
        <button class="btn" onclick="initSystem()">START / התחל</button>
    </div>

    <div class="header-container" id="game-header" style="display:none;">
        <h1>Matching Countries / התאמת מדינות</h1>
        <div class="instruction-box">
            Drag the flag to the matching word.<br>
            גררו את הדגל למילה המתאימה.
        </div>
        <div id="lvl-btns"></div>
    </div>

    <div id="game-stats">
        <div id="timer-display">TIME: 00:00</div>
        <div id="score-display">MATCHES: 0/8</div>
    </div>

    <div id="game-board">
        <div class="col" id="flag-col"></div>
        <div class="col" id="name-col"></div>
    </div>

    <div id="win-modal">
        <h1 style="font-size: 3rem; color: var(--gold);">EXCELLENT! / כל הכבוד!</h1>
        <h2 id="final-time"></h2>
        <button class="btn" onclick="location.reload()">PLAY AGAIN / שחק שוב</button>
    </div>

    <script>
        const database = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let dragTarget = null, grabX, grabY, solved = 0, clock = 0, timerRef = null;

        function initSystem() {
            window.speechSynthesis.getVoices();
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('game-header').style.display = 'block';
            renderLevels();
        }

        function playVoice(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function renderLevels() {
            const container = document.getElementById('lvl-btns');
            container.innerHTML = '';
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = `L${i}`; b.style.margin = "2px";
                b.onclick = () => startLevel(i);
                container.appendChild(b);
            }
        }

        function startLevel(lvl) {
            document.getElementById('lvl-btns').style.display = 'none';
            document.getElementById('game-stats').style.display = 'flex';
            document.getElementById('game-board').style.display = 'grid';
            timerRef = setInterval(() => {
                clock++;
                const m = Math.floor(clock / 60).toString().padStart(2, '0');
                const s = (clock % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `TIME: ${m}:${s}`;
            }, 1000);

            const items = database[lvl];
            const flagDiv = document.getElementById('flag-col');
            const nameDiv = document.getElementById('name-col');

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const unit = document.createElement('div');
                unit.className = 'flag-unit'; unit.dataset.country = d.n;
                unit.innerHTML = `<div class="flag-card">${d.e}</div><button class="big-audio-btn">🔊</button>`;
                unit.querySelector('.big-audio-btn').addEventListener('pointerdown', (e) => { e.stopPropagation(); playVoice(d.n); });
                unit.querySelector('.flag-card').addEventListener('pointerdown', (e) => pickup(e, unit));
                flagDiv.appendChild(unit);
            });

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const s = document.createElement('div');
                s.className = 'name-slot'; s.dataset.country = d.n; s.innerText = d.n;
                nameDiv.appendChild(s);
            });
        }

        function pickup(e, el) {
            dragTarget = el;
            const r = dragTarget.getBoundingClientRect();
            grabX = e.clientX - r.left; grabY = e.clientY - r.top;
            dragTarget.style.position = 'fixed';
            dragTarget.style.zIndex = '1000';
            dragTarget.style.width = r.width + 'px';
            dragTarget.style.height = r.height + 'px';
            dragTarget.style.pointerEvents = 'none';
            
            document.onpointermove = (ev) => {
                dragTarget.style.left = (ev.clientX - grabX) + 'px';
                dragTarget.style.top = (ev.clientY - grabY) + 'px';
            };

            document.onpointerup = (ev) => {
                const slots = document.getElementsByClassName('name-slot');
                let matched = false;
                for(let slot of slots) {
                    const rect = slot.getBoundingClientRect();
                    if(ev.clientX > rect.left && ev.clientX < rect.right && ev.clientY > rect.top && ev.clientY < rect.bottom) {
                        if(slot.dataset.country === dragTarget.dataset.country && !slot.classList.contains('correct')) {
                            slot.classList.add('correct');
                            slot.innerHTML = `<span style="font-size:1.5rem; margin-right:5px;">${dragTarget.querySelector('.flag-card').innerText}</span> ${slot.dataset.country}`;
                            dragTarget.remove(); solved++;
                            document.getElementById('score-display').innerText = `MATCHES: ${solved}/8`;
                            matched = true;
                            if(solved === 8) { clearInterval(timerRef); confetti(); document.getElementById('win-modal').style.display = 'flex'; }
                            break;
                        } else {
                            slot.classList.add('wrong');
                            setTimeout(() => slot.classList.remove('wrong'), 400);
                        }
                    }
                }
                if(!matched && dragTarget) {
                    dragTarget.style.position = 'relative';
                    dragTarget.style.left = '0'; dragTarget.style.top = '0';
                    dragTarget.style.width = '100%'; dragTarget.style.height = '11%';
                    dragTarget.style.pointerEvents = 'auto';
                }
                dragTarget = null; document.onpointermove = null; document.onpointerup = null;
            };
        }
    </script>
</body>
</html>
