<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Passport Pro Matcher</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Assistant:wght@600;800&display=swap');

        :root {
            --desk: #3e2723;
            --paper: #fdfaf0;
            --gold: #d4af37;
            --ink: #1a1a1a;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--desk) url('https://www.transparenttextures.com/patterns/dark-wood.png');
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; touch-action: none;
        }

        /* Essential Start Screen */
        #unlock-screen {
            position: fixed; inset: 0; background: var(--desk); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .header {
            text-align: center; color: var(--paper); border-bottom: 3px solid var(--gold);
            width: 95%; max-width: 800px; padding: 10px 0; margin-bottom: 10px;
        }

        /* TIMER & SCORE BAR */
        #game-stats {
            display: none; width: 100%; max-width: 600px;
            justify-content: space-around; background: rgba(0,0,0,0.6);
            padding: 12px; border-radius: 50px; margin-bottom: 15px;
            color: var(--gold); font-size: 1.4rem; font-weight: bold; border: 1px solid var(--gold);
        }

        /* GRID LAYOUT - SIDE BY SIDE */
        #game-board {
            display: none; grid-template-columns: 130px 1fr;
            gap: 25px; width: 100%; max-width: 850px; padding: 10px;
        }

        .col { display: flex; flex-direction: column; gap: 12px; }

        /* THE FLAG TAGS - Audio triggers on Grab */
        .flag-tag {
            width: 110px; height: 75px; background: white;
            border-radius: 5px; border-left: 10px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; cursor: grab; box-shadow: 4px 6px 12px rgba(0,0,0,0.5);
            z-index: 100; touch-action: none;
        }

        /* THE PASSPORT SLOTS - NO AUDIO BUTTONS */
        .name-slot {
            height: 75px; background: var(--paper);
            border: 2px solid #ddd; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; /* Centered Text */
            color: var(--ink); font-weight: 800;
            font-family: 'Montserrat', sans-serif; font-size: 1.6rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .name-slot.correct { background: #27ae60; color: white; border-color: white; }
        .name-slot.wrong { background: #c0392b; color: white; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .btn {
            background: var(--gold); color: white; border: none;
            padding: 15px 30px; margin: 10px; border-radius: 8px;
            font-size: 1.4rem; font-weight: bold; cursor: pointer;
            font-family: 'Assistant';
        }

        #win-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="unlock-screen">
        <h1 style="font-size: 2.5rem;">READY? / מוכנים?</h1>
        <button class="btn" onclick="initSystem()">START GAME / התחל משחק</button>
        <p>Press to enable sound / לחצו להפעלת שמע</p>
    </div>

    <div id="main-menu" class="header" style="display:none;">
        <h1>Passport Match / התאמת דרכונים</h1>
        <div id="lvl-btns"></div>
    </div>

    <div id="game-stats">
        <div id="timer-display">Time: 00:00 / זמן</div>
        <div id="score-display">Matches: 0/8 / התאמות</div>
    </div>

    <div id="game-board">
        <div class="col" id="flag-col"></div>
        <div class="col" id="name-col"></div>
    </div>

    <div id="win-modal">
        <h1 style="font-size: 3rem;">WELL DONE! / כל הכבוד!</h1>
        <h2 id="final-time" style="color: var(--gold);"></h2>
        <button class="btn" onclick="location.reload()">PLAY AGAIN / שחק שוב</button>
    </div>

    <script>
        const database = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let dragTarget = null, grabX, grabY, solved = 0, clock = 0, timerRef = null;

        function initSystem() {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); 
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
            renderLevels();
        }

        function playVoice(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US';
            msg.rate = 0.85; // Slightly slower for clarity
            window.speechSynthesis.speak(msg);
        }

        function runTimer() {
            clock++;
            const m = Math.floor(clock / 60).toString().padStart(2, '0');
            const s = (clock % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `Time: ${m}:${s} / זמן`;
        }

        function renderLevels() {
            const container = document.getElementById('lvl-btns');
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = `Level ${i} / שלב`;
                b.onclick = () => start(i);
                container.appendChild(b);
            }
        }

        function start(lvl) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-stats').style.display = 'flex';
            document.getElementById('game-board').style.display = 'grid';
            timerRef = setInterval(runTimer, 1000);

            const items = database[lvl];
            const flagDiv = document.getElementById('flag-col');
            const nameDiv = document.getElementById('name-col');

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const f = document.createElement('div');
                f.className = 'flag-tag'; f.innerText = d.e; f.dataset.country = d.n;
                // AUDIO TRIGGER ON FLAG GRAB
                f.onpointerdown = (e) => pickup(e, f);
                flagDiv.appendChild(f);
            });

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const s = document.createElement('div');
                s.className = 'name-slot'; s.dataset.country = d.n;
                s.innerHTML = `<span>${d.n}</span>`;
                nameDiv.appendChild(s);
            });
        }

        function pickup(e, el) {
            dragTarget = el;
            dragTarget.style.transition = 'none';
            const r = dragTarget.getBoundingClientRect();
            grabX = e.clientX - r.left; grabY = e.clientY - r.top;
            dragTarget.style.position = 'fixed'; dragTarget.style.zIndex = '1000';
            
            // Trigger audio when grabbed
            playVoice(dragTarget.dataset.country);

            document.onpointermove = (ev) => {
                dragTarget.style.left = (ev.clientX - grabX) + 'px';
                dragTarget.style.top = (ev.clientY - grabY) + 'px';
            };

            document.onpointerup = (ev) => {
                const slots = document.getElementsByClassName('name-slot');
                let found = false;
                for(let slot of slots) {
                    const rect = slot.getBoundingClientRect();
                    if(ev.clientX > rect.left && ev.clientX < rect.right && ev.clientY > rect.top && ev.clientY < rect.bottom) {
                        if(slot.dataset.country === dragTarget.dataset.country && !slot.classList.contains('correct')) {
                            slot.classList.add('correct');
                            slot.innerHTML = `<span style="font-size:2.4rem">${dragTarget.innerText}</span> <span>${slot.dataset.country}</span>`;
                            dragTarget.remove();
                            solved++;
                            document.getElementById('score-display').innerText = `Matches: ${solved}/8 / התאמות`;
                            playVoice("Excellent");
                            found = true;
                            if(solved === 8) {
                                clearInterval(timerRef);
                                confetti();
                                document.getElementById('final-time').innerText = `Final Time: ${document.getElementById('timer-display').innerText.split('/')[0]}`;
                                document.getElementById('win-modal').style.display = 'flex';
                            }
                            break;
                        } else if (!slot.classList.contains('correct')) {
                            slot.classList.add('wrong');
                            setTimeout(() => slot.classList.remove('wrong'), 400);
                            playVoice("Try again");
                        }
                    }
                }
                if(!found && dragTarget) {
                    dragTarget.style.transition = '0.3s';
                    dragTarget.style.position = 'relative';
                    dragTarget.style.left = '0'; dragTarget.style.top = '0';
                }
                dragTarget = null; document.onpointermove = null; document.onpointerup = null;
            };
        }
    </script>
</body>
</html>
