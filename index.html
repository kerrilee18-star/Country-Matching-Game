<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>דרכון עולמי: משחק התאמה</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Assistant:wght@400;700&display=swap');

        :root {
            --desk: #4e342e;
            --parchment: #fdfaf0;
            --ink: #1a1a1a;
            --gold: #c5a021;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--desk);
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; touch-action: none;
        }

        /* Audio & Start Overlay */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--desk); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .header {
            text-align: center; color: var(--parchment);
            border-bottom: 3px solid var(--gold);
            width: 100%; max-width: 800px; padding: 10px 0; margin-bottom: 15px;
        }

        #stats-bar {
            display: flex; justify-content: space-around; width: 100%;
            max-width: 600px; color: var(--gold); font-weight: bold; font-size: 1.5rem;
            margin-bottom: 15px; text-shadow: 1px 1px 2px black;
        }

        /* Aligned Grid */
        .game-grid {
            display: none; 
            grid-template-columns: 1fr 140px; /* Name on Right, Flag on Left for RTL */
            gap: 30px; width: 100%; max-width: 900px;
        }

        .column { display: flex; flex-direction: column; gap: 12px; }

        /* Draggable Flag */
        .flag-tag {
            width: 120px; height: 80px; 
            background: white; border-radius: 4px;
            border-right: 10px solid var(--gold); /* Swapped for RTL */
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; cursor: grab; position: relative;
            box-shadow: 4px 6px 12px rgba(0,0,0,0.4);
            z-index: 100; touch-action: none;
        }

        /* Name Box (English Content) */
        .name-box {
            height: 80px; background: var(--parchment);
            border: 2px solid #dcd7ca; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; color: var(--ink); font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            position: relative; font-size: 1.6rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            direction: ltr; /* Keeps English text readable */
        }

        .audio-btn {
            background: var(--gold); border: none; width: 50px; height: 50px;
            border-radius: 50%; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; box-shadow: 0 4px 0 #8d7318;
        }

        .lvl-btn {
            background: var(--gold); color: white; border: none;
            padding: 15px 40px; margin: 10px; border-radius: 10px;
            font-size: 1.8rem; cursor: pointer; font-weight: bold;
            font-family: 'Assistant';
        }

        .name-box.correct { background: #2ecc71; color: white; border: none; }
        .name-box.wrong { background: #e74c3c; color: white; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        #win-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>מוכנים לצאת לדרך?</h1>
        <button class="lvl-btn" onclick="unlockAudio()">לחצו כאן כדי להתחיל</button>
    </div>

    <div id="menu" class="header" style="display:none;">
        <h1>ביקורת דרכונים עולמית</h1>
        <div id="level-list"></div>
    </div>

    <div id="stats-bar" style="display:none;">
        <div id="timer">זמן: 00:00</div>
        <div id="score">התאמות: 0/8</div>
    </div>

    <div class="game-grid" id="board">
        <div class="column" id="flags"></div>
        <div class="column" id="names"></div>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 3rem;">הדרכון הוחתם! ✈️</h1>
        <h2 id="final-time"></h2>
        <button class="lvl-btn" onclick="location.reload()">טיסה הבאה</button>
    </div>

    <script>
        const gameData = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let dragTarget = null, grabX, grabY, matches = 0;
        let seconds = 0, timerInterval = null;

        function unlockAudio() {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(' '));
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            createMenu();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `זמן: ${mins}:${secs}`;
        }

        function createMenu() {
            const list = document.getElementById('level-list');
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button');
                b.className = 'lvl-btn'; b.innerText = `שלב ${i}`;
                b.onclick = () => startLevel(i);
                list.appendChild(b);
            }
        }

        function startLevel(lvl) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('board').style.display = 'grid';
            document.getElementById('stats-bar').style.display = 'flex';
            timerInterval = setInterval(updateTimer, 1000);

            const items = gameData[lvl];
            const flagCol = document.getElementById('flags');
            const nameCol = document.getElementById('names');

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const f = document.createElement('div');
                f.className = 'flag-tag'; f.innerText = d.e; f.dataset.name = d.n;
                f.addEventListener('pointerdown', (e) => onGrab(e, f));
                flagCol.appendChild(f);
            });

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const n = document.createElement('div');
                n.className = 'name-box'; n.dataset.name = d.n;
                n.innerHTML = `<button class="audio-btn" onclick="speak('${d.n}')">🔊</button> <span>${d.n}</span>`;
                nameCol.appendChild(n);
            });
        }

        function onGrab(e, el) {
            dragTarget = el;
            dragTarget.style.transition = 'none';
            const rect = dragTarget.getBoundingClientRect();
            grabX = e.clientX - rect.left;
            grabY = e.clientY - rect.top;
            dragTarget.style.position = 'fixed';
            dragTarget.style.zIndex = '1000';
            speak(dragTarget.dataset.name);
            
            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onDrop);
        }

        function onMove(e) {
            if(!dragTarget) return;
            dragTarget.style.left = (e.clientX - grabX) + 'px';
            dragTarget.style.top = (e.clientY - grabY) + 'px';
        }

        function onDrop(e) {
            const boxes = document.getElementsByClassName('name-box');
            let matched = false;

            for(let b of boxes) {
                const r = b.getBoundingClientRect();
                if(e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom) {
                    if(b.dataset.name === dragTarget.dataset.name && !b.classList.contains('correct')) {
                        b.classList.add('correct');
                        b.innerHTML = `<span>${b.dataset.name}</span> <span style="font-size:2.5rem">${dragTarget.innerText}</span>`;
                        dragTarget.remove();
                        matches++;
                        document.getElementById('score').innerText = `התאמות: ${matches}/8`;
                        matched = true;
                        if(matches === 8) {
                            clearInterval(timerInterval);
                            confetti();
                            document.getElementById('final-time').innerText = `זמן סופי: ${document.getElementById('timer').innerText.split(': ')[1]}`;
                            document.getElementById('win-screen').style.display='flex';
                        }
                        break;
                    } else if (!b.classList.contains('correct')) {
                        b.classList.add('wrong');
                        setTimeout(() => b.classList.remove('wrong'), 400);
                        speak("No");
                    }
                }
            }

            if(!matched && dragTarget) {
                dragTarget.style.transition = '0.3s';
                dragTarget.style.position = 'relative';
                dragTarget.style.left = '0'; dragTarget.style.top = '0';
            }
            dragTarget = null;
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onDrop);
        }
    </script>
</body>
</html>
