<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Matcher: Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --wood: #3e2723;
            --paper: #fdfaf0;
            --ink: #2c3e50;
            --gold: #c5a021;
            --green: #27ae60;
            --red: #c0392b;
        }

        body {
            font-family: 'Segoe UI', serif;
            background: #5d4037; /* Desk color */
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; touch-action: none;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 15px; text-align: center;
            width: 90%; max-width: 600px; color: white;
            border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px;
        }

        .lvl-btn {
            background: var(--paper); border: none; padding: 10px 20px;
            margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold;
            color: var(--wood); box-shadow: 0 4px 0 #999;
        }

        .game-area {
            display: flex; justify-content: space-around;
            width: 100%; max-width: 800px; gap: 20px;
        }

        /* Draggable Tags */
        .tag-container { width: 120px; display: flex; flex-direction: column; gap: 15px; }
        .flag-tag {
            width: 100px; height: 70px; background: var(--paper);
            border-radius: 5px; border-left: 8px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; cursor: grab; position: relative;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
            user-select: none; z-index: 10;
        }

        /* Drop Zones */
        .zones-container { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        .name-zone {
            height: 60px; background: rgba(0, 0, 0, 0.2);
            border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 10px; display: flex; align-items: center;
            padding: 0 20px; color: white; font-weight: bold;
            justify-content: space-between; position: relative;
            transition: 0.3s;
        }

        .audio-btn {
            background: var(--gold); border: none; width: 35px; height: 35px;
            border-radius: 50%; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .name-zone.correct {
            background: var(--green); border-style: solid;
            border-color: #fff; box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        }

        .name-zone.wrong { background: var(--red); animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; flex-direction: column;
        }

        .win-box { background: white; padding: 40px; border-radius: 20px; text-align: center; border: 8px solid var(--gold); }
    </style>
</head>
<body>

    <div id="menu" class="header">
        <h1>✈️ Global Traveler</h1>
        <p>Match Flags to the Destinations</p>
        <div id="level-btns"></div>
    </div>

    <div class="game-area" id="game-board" style="display:none;">
        <div class="tag-container" id="tags"></div>
        <div class="zones-container" id="zones"></div>
    </div>

    <div id="overlay">
        <div class="win-box">
            <h1>PASSPORT STAMPED! ✈️</h1>
            <button class="lvl-btn" onclick="location.reload()">Next Destination</button>
        </div>
    </div>

    <script>
        const levels = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let activeTag = null, startX, startY, currentMatches = 0;

        function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }

        function initMenu() {
            const container = document.getElementById('level-btns');
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button'); b.className = 'lvl-btn'; b.innerText = `Level ${i}`;
                b.onclick = () => startLevel(i); container.appendChild(b);
            }
        }

        function startLevel(l) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-board').style.display = 'flex';
            const data = levels[l];
            const tagsDiv = document.getElementById('tags');
            const zonesDiv = document.getElementById('zones');
            
            [...data].sort(()=>Math.random()-0.5).forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'flag-tag'; tag.innerText = item.e; tag.dataset.name = item.n;
                tag.onpointerdown = startDrag;
                tagsDiv.appendChild(tag);
            });

            [...data].sort(()=>Math.random()-0.5).forEach(item => {
                const zone = document.createElement('div');
                zone.className = 'name-zone'; zone.dataset.name = item.n;
                zone.innerHTML = `<span>${item.n}</span><button class="audio-btn" onclick="speak('${item.n}')">🔊</button>`;
                zonesDiv.appendChild(zone);
            });
        }

        function startDrag(e) {
            activeTag = e.target;
            activeTag.style.transition = 'none';
            activeTag.style.zIndex = 1000;
            startX = e.clientX - activeTag.offsetLeft;
            startY = e.clientY - activeTag.offsetTop;
            document.onpointermove = doDrag;
            document.onpointerup = stopDrag;
            speak(activeTag.dataset.name);
        }

        function doDrag(e) {
            if(!activeTag) return;
            activeTag.style.left = (e.clientX - startX) + 'px';
            activeTag.style.top = (e.clientY - startY) + 'px';
        }

        function stopDrag(e) {
            const zones = document.getElementsByClassName('name-zone');
            let matched = false;

            for (let zone of zones) {
                const rect = zone.getBoundingClientRect();
                if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
                    if (zone.dataset.name === activeTag.dataset.name && !zone.classList.contains('correct')) {
                        // Success
                        zone.classList.add('correct');
                        zone.innerHTML = `<span style="font-size:1.5rem">${activeTag.innerText}</span> <span>${zone.dataset.name}</span>`;
                        activeTag.remove();
                        currentMatches++;
                        speak("Excellent");
                        matched = true;
                        if(currentMatches === 8) { confetti(); document.getElementById('overlay').style.display='flex'; }
                        break;
                    } else if (!zone.classList.contains('correct')) {
                        // Wrong
                        zone.classList.add('wrong');
                        setTimeout(() => zone.classList.remove('wrong'), 500);
                        speak("Not there");
                    }
                }
            }

            if (!matched && activeTag) {
                activeTag.style.transition = '0.3s';
                activeTag.style.left = '0px';
                activeTag.style.top = '0px';
                activeTag.style.zIndex = 10;
            }
            activeTag = null; document.onpointermove = null; document.onpointerup = null;
        }

        initMenu();
    </script>
</body>
</html>
