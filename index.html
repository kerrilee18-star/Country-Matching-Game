<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Country Matching Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Assistant:wght@600;800&display=swap');

        :root {
            --navy: #2c3e50;
            --gold: #b8860b;
            --paper: #0d1b2a;
            --green: #27ae60;
            --red: #e74c3c;
            --orange: #e67e22;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            touch-action: none; 
        }
        
        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            margin: 0; padding: 0; position: fixed;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: #e5e0d8 url('https://www.transparenttextures.com/patterns/world-map.png');
            display: flex; flex-direction: column; align-items: center;
        }

        .screen {
            position: fixed; inset: 0; background: var(--navy); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }

        .lang-sub { display: block; font-size: 0.8rem; font-weight: 400; opacity: 0.9; }

        .instruction-box {
            background: rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; margin: 15px 0;
            font-size: 0.9rem; line-height: 1.4; border-left: 4px solid var(--gold);
            max-width: 350px; text-align: left;
        }

        .mode-selector {
            margin: 10px 0; background: rgba(255,255,255,0.1); padding: 12px;
            border-radius: 15px; display: flex; align-items: center; gap: 15px;
            border: 1px solid var(--gold);
        }

        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(26px); }

        #game-board {
            display: none; grid-template-columns: 1fr 2.5fr; gap: 10px;
            width: 95%; max-width: 800px; height: 72vh; margin-top: 10px;
        }

        .col { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }

        .flag-card {
            width: clamp(50px, 15vw, 80px); height: clamp(35px, 10vw, 55px);
            background: white; border-radius: 8px; border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem); cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 10;
        }

        .name-slot {
            height: 11%; width: 100%; background: var(--paper); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; padding: 0 12px;
            font-size: clamp(0.7rem, 2.8vw, 1.1rem); transition: all 0.3s;
            border: 2px solid transparent; text-align: center; position: relative;
        }

        .name-slot.correct { background: var(--green) !important; border-color: #fff; }
        .name-slot.wrong { background: var(--red) !important; border-color: #fff; }

        .big-audio-btn {
            width: 42px; height: 42px; background: var(--gold); border-radius: 50%;
            border: none; color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 3px 0 #8c6608;
        }

        .challenge-hidden { visibility: hidden; pointer-events: none; }

        .btn-main {
            background: var(--gold); color: white; border: none;
            padding: 10px; border-radius: 10px; font-weight: bold;
            box-shadow: 0 4px 0 #8c6608; min-width: 140px; margin: 5px;
        }

        #game-stats {
            display:none; width: 100%; background: var(--navy); color: white; 
            padding: 8px; border-radius: 0 0 20px 20px; justify-content: space-around; 
            font-weight: bold; align-items: center;
        }
    </style>
</head>
<body onpointerdown="initAudio()">

    <div id="unlock-screen" class="screen">
        <h1 style="font-size: 2.2rem; margin:0;">Country Matching Game</h1>
        <h2 style="font-weight: 400; margin-bottom: 5px;">משחק התאמת מדינות</h2>

        <div class="instruction-box">
            <p><strong>EN:</strong> Drag the flag to the correct country.</p>
            <p style="text-align: right; direction: rtl;"><strong>HE:</strong> גרור את הדגל למדינה הנכונה.</p>
        </div>
        
        <div class="mode-selector">
            <div style="text-align: right;">Learning<br><small>למידה</small></div>
            <label class="switch">
                <input type="checkbox" id="challenge-toggle" onchange="updateBestScoresDisplay()">
                <span class="slider"></span>
            </label>
            <div style="text-align: left;">Challenge<br><small>אתגר</small></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%; max-width:420px;">
            <button class="btn-main" onclick="startLevel(1)">Level One <span class="lang-sub">שלב 1</span><span id="best-1" class="best-score-label"></span></button>
            <button class="btn-main" onclick="startLevel(2)">Level Two <span class="lang-sub">שלב 2</span><span id="best-2" class="best-score-label"></span></button>
            <button class="btn-main" onclick="startLevel(3)">Level Three <span class="lang-sub">שלב 3</span><span id="best-3" class="best-score-label"></span></button>
            <button class="btn-main" onclick="startLevel(4)">Level Four <span class="lang-sub">שלב 4</span><span id="best-4" class="best-score-label"></span></button>
        </div>
    </div>

    <div id="game-stats">
        <button id="exit-btn" style="background:var(--orange); border:none; color:white; padding:5px 10px; border-radius:5px;" onclick="location.reload()">EXIT / יציאה</button>
        <div id="timer-display">00:00</div>
        <div id="score-display">0/8</div>
    </div>

    <div id="game-board">
        <div class="col" id="flag-col"></div>
        <div class="col" id="name-col"></div>
    </div>

    <div id="win-modal" class="screen" style="display:none;">
        <h1 id="feedback-en" style="color: var(--gold); font-size: 2.5rem; margin:0;"></h1>
        <h2 id="feedback-he" style="margin-top:0; font-weight:400;"></h2>
        <p id="final-score" style="font-size: 1.8rem; font-weight: 800; margin: 10px 0;"></p>
        <p id="final-time" style="font-size: 1.2rem;"></p>
        <p id="new-best-msg" style="color:#f1c40f; font-weight:bold; display:none;">NEW CHALLENGE BEST! / שיא אתגר חדש!</p>
        
        <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 15px;">
            <button id="review-btn" style="background:#7f8c8d; color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;" onclick="showReview()">REVIEW RESULTS / בדוק תוצאות</button>
            <button class="btn-main" onclick="location.reload()" style="padding: 15px 30px;">PLAY AGAIN / לשחק שוב</button>
        </div>
    </div>

    <script>
        const database = {
            1: [{e:"🇦🇷", n:"Argentina", h:"ארגנטינה"}, {e:"🇦🇺", n:"Australia", h:"אוסטרליה"}, {e:"🇧🇷", n:"Brazil", h:"ברזיל"}, {e:"🇨🇦", n:"Canada", h:"קנדה"}, {e:"🇨🇴", n:"Colombia", h:"קולומביה"}, {e:"🇲🇽", n:"Mexico", h:"מקסיקו"}, {e:"🇵🇦", n:"Panama", h:"פנמה"}, {e:"🇺🇸", n:"America", h:"ארה״ב"}],
            2: [{e:"🇮🇹", n:"Italy", h:"איטליה"}, {e:"🇧🇪", n:"Belgium", h:"בלגיה"}, {e:"🇯🇵", n:"Japan", h:"יפן"}, {e:"🇷🇺", n:"Russia", h:"רוסיה"}, {e:"🇺🇦", n:"Ukraine", h:"אוקראינה"}, {e:"🇪🇹", n:"Ethiopia", h:"אתיופיה"}, {e:"🇬🇧", n:"England", h:"אנגליה"}, {e:"🇩🇪", n:"Germany", h:"גרמניה"}],
            3: [{e:"🇿🇦", n:"South Africa", h:"דרום אפריקה"}, {e:"🇭🇺", n:"Hungary", h:"הונגריה"}, {e:"🇵🇱", n:"Poland", h:"פולין"}, {e:"🇳🇴", n:"Norway", h:"נורווגיה"}, {e:"🇹🇭", n:"Thailand", h:"תאילנד"}, {e:"🇸🇪", n:"Sweden", h:"שבדיה"}, {e:"🇨🇳", n:"China", h:"סין"}, {e:"🇮🇪", n:"Ireland", h:"אירלנד"}],
            4: [{e:"🇪🇬", n:"Egypt", h:"מצרים"}, {e:"🇬🇷", n:"Greece", h:"יוון"}, {e:"🇨🇾", n:"Cyprus", h:"קפריסין"}, {e:"🇫🇷", n:"France", h:"צרפת"}, {e:"🇮🇳", n:"India", h:"הודו"}, {e:"🇨🇭", n:"Switzerland", h:"שוויץ"}, {e:"🇳🇱", n:"Netherlands", h:"הולנד"}, {e:"🇱🇹", n:"Lithuania", h:"ליטא"}]
        };

        let currentLvl = 1, solved = 0, correctCount = 0, clock = 0, timerRef = null, isChallenge = false;
        
        // --- IMPROVED AUDIO LOGIC ---
        let audioWoken = false;

        function initAudio() {
            if (audioWoken) return;
            const msg = new SpeechSynthesisUtterance(" ");
            msg.volume = 0;
            window.speechSynthesis.speak(msg);
            audioWoken = true;
        }

        function playSound(text) {
            // Cancel anything current to prevent "clogging"
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            
            // Re-wake engine right before speaking
            window.speechSynthesis.speak(msg);
        }

        // Catch global clicks to keep engine alive
        document.addEventListener('pointerdown', initAudio);

        // --- GAMEPLAY FUNCTIONS ---
        function updateBestScoresDisplay() {
            const challenge = document.getElementById('challenge-toggle').checked;
            for(let i=1; i<=4; i++) {
                const best = localStorage.getItem('best_challenge_' + i);
                document.getElementById('best-'+i).innerText = (challenge && best) ? `Best: ${formatTime(best)}` : '';
            }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startLevel(lvl) {
            currentLvl = lvl;
            isChallenge = document.getElementById('challenge-toggle').checked;
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('game-stats').style.display = 'flex';
            document.getElementById('game-board').style.display = 'grid';

            const flagCol = document.getElementById('flag-col');
            const nameCol = document.getElementById('name-col');
            flagCol.innerHTML = ''; nameCol.innerHTML = '';
            solved = 0; correctCount = 0; clock = 0;
            
            timerRef = setInterval(() => {
                clock++;
                document.getElementById('timer-display').innerText = formatTime(clock);
            }, 1000);

            [...database[lvl]].sort(() => Math.random() - 0.5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'flag-unit'; div.style.cssText = 'display:flex; align-items:center; gap:8px; height:11%;';
                const audioClass = isChallenge ? 'challenge-hidden' : '';
                div.innerHTML = `<div class="flag-card" onpointerdown="pickup(event, this)" data-n="${item.n}">${item.e}</div>
                                 <button class="big-audio-btn ${audioClass}" onpointerdown="playSound('${item.n}')">🔊</button>`;
                flagCol.appendChild(div);
            });

            [...database[lvl]].sort(() => Math.random() - 0.5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'name-slot'; div.dataset.n = item.n; div.dataset.h = item.h; div.innerText = item.n;
                nameCol.appendChild(div);
            });
        }

        let dragEl = null, startX, startY;
        function pickup(e, el) {
            initAudio(); // Force wake on grab
            if (solved >= 8) return;
            dragEl = el; startX = e.clientX; startY = e.clientY;
            dragEl.style.zIndex = "2000"; dragEl.style.transition = "none";
            
            document.onpointermove = (ev) => { 
                if(dragEl) dragEl.style.transform = `translate(${ev.clientX - startX}px, ${ev.clientY - startY}px)`; 
            };

            document.onpointerup = (ev) => {
                if(!dragEl) return;
                const slots = document.getElementsByClassName('name-slot');
                let placed = false;

                for (let s of slots) {
                    const r = s.getBoundingClientRect();
                    if (ev.clientX > r.left && ev.clientX < r.right && ev.clientY > r.top && ev.clientY < r.bottom) {
                        const isCorrect = (s.dataset.n === dragEl.dataset.n);
                        if (isChallenge) {
                            if (!s.classList.contains('occupied')) {
                                s.classList.add('occupied');
                                if (isCorrect) { s.classList.add('correct'); correctCount++; } 
                                else { s.classList.add('wrong'); }
                                finalizeSlot(s, dragEl);
                                placed = true;
                            }
                        } else {
                            if (isCorrect && !s.classList.contains('occupied')) {
                                s.classList.add('occupied', 'correct');
                                correctCount++;
                                finalizeSlot(s, dragEl);
                                placed = true;
                            }
                        }
                        if (placed) break;
                    }
                }
                if (!placed) {
                    dragEl.style.transition = "transform 0.3s";
                    dragEl.style.transform = "translate(0,0)";
                }
                dragEl = null; document.onpointermove = null; document.onpointerup = null;
            };
        }

        function finalizeSlot(slot, flag) {
            slot.innerHTML = `<span style="position:absolute; left:10px; font-size:1.4rem;">${flag.innerText}</span>
                              <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
                                <span style="font-size:1.2rem; font-weight:800; color:#f1c40f; line-height:1;">${slot.dataset.n}</span>
                                <span style="font-size:0.8rem; opacity:0.8; font-weight:400; line-height:1.2;">${slot.dataset.h}</span>
                              </div>`;
            flag.remove();
            solved++;
            document.getElementById('score-display').innerText = `${solved}/8`;
            if (solved === 8) endGame();
        }

        function endGame() {
            clearInterval(timerRef);
            let en = "", he = "";
            if (correctCount === 8) { en = "AMAZING!"; he = "מדהים!"; }
            else if (correctCount >= 5) { en = "GREAT JOB!"; he = "כל הכבוד!"; }
            else { en = "KEEP TRYING!"; he = "תמשיכו לנסות!"; }

            document.getElementById('feedback-en').innerText = en;
            document.getElementById('feedback-he').innerText = he;
            
            if (isChallenge && correctCount === 8) {
                const storageKey = 'best_challenge_' + currentLvl;
                const previousBest = localStorage.getItem(storageKey);
                if (!previousBest || clock < parseInt(previousBest)) {
                    localStorage.setItem(storageKey, clock);
                    document.getElementById('new-best-msg').style.display = 'block';
                }
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            document.getElementById('review-btn').style.display = (isChallenge && correctCount < 8) ? 'block' : 'none';

            setTimeout(() => {
                document.getElementById('game-board').style.display = 'none';
                document.getElementById('game-stats').style.display = 'none';
                document.getElementById('final-score').innerText = isChallenge ? `${correctCount} / 8 Correct` : `Practice Complete!`;
                document.getElementById('final-time').innerText = `Time: ${formatTime(clock)}`;
                document.getElementById('win-modal').style.display = 'flex';
            }, 800);
        }

        function showReview() {
            document.getElementById('win-modal').style.display = 'none';
            document.getElementById('game-board').style.display = 'grid';
            document.getElementById('game-stats').style.display = 'flex';
            document.getElementById('exit-btn').innerText = "DONE / סיים";
        }

        updateBestScoresDisplay();
    </script>
</body>
</html>
