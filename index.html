<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Matcher Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        /* 1. HIGH CONTRAST & CLEAN FONT */
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #f0f4f7; /* Very light blue-grey, soft on eyes */
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            touch-action: none; /* Crucial for stopping browser jitter */
        }

        .header {
            text-align: center; color: #2c3e50;
            border-bottom: 5px solid #d4af37;
            width: 100%; max-width: 800px;
            margin-bottom: 30px; padding-bottom: 10px;
        }

        .lvl-btn {
            background: #2c3e50; color: white; border: none;
            padding: 20px 40px; margin: 10px; border-radius: 10px;
            font-size: 1.5rem; cursor: pointer;
        }

        /* 2. ALIGNED SIDE-BY-SIDE LAYOUT */
        .game-grid {
            display: none; /* Hidden until level select */
            grid-template-columns: 150px 1fr; 
            gap: 50px; width: 100%; max-width: 900px;
        }

        .col { display: flex; flex-direction: column; gap: 20px; }

        /* 3. THE FLAG TAGS */
        .flag-item {
            width: 130px; height: 90px; background: white;
            border: 3px solid #2c3e50; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; cursor: move; position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            z-index: 10; touch-action: none;
        }

        /* 4. THE NAME BOXES */
        .name-box {
            height: 90px; background: white;
            border: 4px dashed #bdc3c7; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; font-size: 1.8rem; color: #1a1a1a;
            position: relative; box-sizing: border-box;
        }

        /* 5. THE AUDIO BUTTON (PROMINENT) */
        .speaker-btn {
            background: #d4af37; border: none; width: 60px; height: 60px;
            border-radius: 50%; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; box-shadow: 0 4px 0 #a6892c;
        }

        /* FEEDBACK STATES */
        .name-box.correct { background: #27ae60; border: 4px solid #fff; color: white; }
        .name-box.wrong { background: #c0392b; color: white; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        #win-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="menu" class="header">
        <h1>GLOBAL MATCHING PRO</h1>
        <div id="level-list"></div>
    </div>

    <div class="game-grid" id="board">
        <div class="col" id="flags"></div>
        <div class="col" id="names"></div>
    </div>

    <div id="win-screen">
        <h1 style="color:white; font-size: 4rem;">EXCELLENT! ✈️</h1>
        <button class="lvl-btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        const dataSet = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let activeObj = null, offset = {x:0, y:0}, winCount = 0;

        // FIXED AUDIO FUNCTION
        function speak(val) {
            if (!val) return;
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(val);
            speech.lang = 'en-US';
            window.speechSynthesis.speak(speech);
        }

        function createMenu() {
            const m = document.getElementById('level-list');
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button');
                b.className = 'lvl-btn'; b.innerText = `LEVEL ${i}`;
                b.onclick = () => initGame(i);
                m.appendChild(b);
            }
        }

        function initGame(lvl) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('board').style.display = 'grid';
            const currentItems = dataSet[lvl];
            
            const flagArea = document.getElementById('flags');
            const nameArea = document.getElementById('names');

            [...currentItems].sort(()=>Math.random()-0.5).forEach(item => {
                const f = document.createElement('div');
                f.className = 'flag-item'; f.innerText = item.e; f.dataset.country = item.n;
                // Use Pointer Events for cross-platform support (Touch + Mouse)
                f.onpointerdown = (e) => startMove(e, f);
                flagArea.appendChild(f);
            });

            [...currentItems].sort(()=>Math.random()-0.5).forEach(item => {
                const n = document.createElement('div');
                n.className = 'name-box'; n.dataset.country = item.n;
                n.innerHTML = `<span>${item.n}</span> 
                    <button class="speaker-btn" onpointerdown="event.stopPropagation(); speak('${item.n}')">🔊</button>`;
                nameArea.appendChild(n);
            });
        }

        function startMove(e, el) {
            activeObj = el;
            activeObj.style.transition = 'none';
            activeObj.style.zIndex = '9999';
            const b = activeObj.getBoundingClientRect();
            offset.x = e.clientX - b.left;
            offset.y = e.clientY - b.top;
            
            activeObj.style.position = 'fixed';
            activeObj.style.left = (e.clientX - offset.x) + 'px';
            activeObj.style.top = (e.clientY - offset.y) + 'px';

            document.onpointermove = (ev) => {
                if(!activeObj) return;
                activeObj.style.left = (ev.clientX - offset.x) + 'px';
                activeObj.style.top = (ev.clientY - offset.y) + 'px';
            };

            document.onpointerup = (ev) => {
                const zones = document.getElementsByClassName('name-box');
                let found = false;

                for(let z of zones) {
                    const r = z.getBoundingClientRect();
                    if(ev.clientX > r.left && ev.clientX < r.right && ev.clientY > r.top && ev.clientY < r.bottom) {
                        if(z.dataset.country === activeObj.dataset.country && !z.classList.contains('correct')) {
                            // CORRECT
                            z.classList.add('correct');
                            z.innerHTML = `<span style="font-size:3rem">${activeObj.innerText}</span> <span>${z.dataset.country}</span>`;
                            activeObj.remove();
                            winCount++;
                            speak("Correct");
                            found = true;
                            if(winCount === 8) { confetti(); document.getElementById('win-screen').style.display='flex'; }
                            break;
                        } else if (!z.classList.contains('correct')) {
                            // WRONG
                            z.classList.add('wrong');
                            setTimeout(() => z.classList.remove('wrong'), 500);
                            speak("No");
                        }
                    }
                }

                if(!found && activeObj) {
                    activeObj.style.transition = '0.3s';
                    activeObj.style.position = 'relative';
                    activeObj.style.left = '0'; activeObj.style.top = '0';
                }
                activeObj = null;
                document.onpointermove = null;
                document.onpointerup = null;
            };
        }

        createMenu();
    </script>
</body>
</html>
