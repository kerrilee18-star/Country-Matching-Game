<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matching Countries</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Assistant:wght@600;800&display=swap');

        :root {
            --desk: #1a0f0d; 
            --paper-dark: #0d1b2a; 
            --gold: #d4af37;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--desk) url('https://www.transparenttextures.com/patterns/dark-wood.png');
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; touch-action: none;
        }

        #unlock-screen {
            position: fixed; inset: 0; background: var(--desk); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }

        .header {
            text-align: center; color: white; border-bottom: 4px solid var(--gold);
            width: 95%; max-width: 800px; padding: 5px 0; margin-bottom: 10px;
        }

        /* NEW INSTRUCTIONS AREA */
        .instructions {
            color: #ccc; font-size: 1.1rem; text-align: center; margin-bottom: 15px;
            line-height: 1.4; font-weight: 600;
        }

        #game-stats {
            display: none; width: 100%; max-width: 700px;
            justify-content: space-around; background: rgba(0,0,0,0.6);
            padding: 10px; border-radius: 12px; margin-bottom: 15px;
            color: var(--gold); font-size: 1.3rem; font-weight: bold; border: 2px solid var(--gold);
        }

        /* RESPONSIVE GRID - Shrinks for iPad/Mobile */
        #game-board {
            display: none; grid-template-columns: minmax(140px, 180px) 1fr;
            gap: 15px; width: 100%; max-width: 800px; padding: 5px;
            align-items: center;
        }

        .col { display: flex; flex-direction: column; gap: 10px; }

        .flag-unit {
            display: flex; align-items: center; gap: 8px;
            z-index: 100; touch-action: none; height: 75px;
        }

        .flag-card {
            width: 90px; height: 65px; background: white;
            border-radius: 8px; border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; box-shadow: 3px 5px 10px rgba(0,0,0,0.5);
            cursor: grab;
        }

        .big-audio-btn {
            width: 45px; height: 45px; background: var(--gold);
            border-radius: 50%; border: none; color: white;
            font-size: 1.3rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 3px 0 #8d7318;
        }

        .name-slot {
            height: 65px; background: var(--paper-dark);
            border: 2px solid #334155; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-white); font-weight: 900;
            font-family: 'Montserrat', sans-serif; font-size: 1.4rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            text-transform: uppercase;
            padding: 0 10px;
        }

        /* MEDIA QUERY FOR SMALL SCREENS */
        @media (max-width: 600px) {
            .name-slot { font-size: 1.1rem; }
            .flag-card { width: 70px; height: 55px; font-size: 2rem; }
            .flag-unit { height: 65px; }
            .name-slot { height: 55px; }
            #game-board { grid-template-columns: 130px 1fr; }
        }

        .name-slot.correct { background: #1b4332 !important; border-color: #2d6a4f; }
        .name-slot.wrong { background: #780000; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .btn {
            background: var(--gold); color: white; border: none;
            padding: 15px 35px; margin: 10px; border-radius: 8px;
            font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #8d7318; font-family: 'Assistant';
        }

        #win-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="unlock-screen">
        <h1 style="font-size: 2.5rem; margin: 0;">Matching Countries</h1>
        <h2 style="font-family: 'Assistant'; margin: 10px 0;">התאמת מדינות</h2>
        <button class="btn" onclick="initSystem()">START / התחל</button>
    </div>

    <div id="main-menu" class="header" style="display:none;">
        <h1 style="margin: 5px 0;">Matching Countries / התאמת מדינות</h1>
        <div id="lvl-btns"></div>
    </div>

    <div id="instr" class="instructions" style="display:none;">
        Drag the flag to the matching word.<br>
        גררו את הדגל למילה המתאימה.
    </div>

    <div id="game-stats">
        <div id="timer-display">TIME: 00:00</div>
        <div id="score-display">MATCHES: 0/8</div>
    </div>

    <div id="game-board">
        <div class="col" id="flag-col"></div>
        <div class="col" id="name-col"></div>
    </div>

    <div id="win-modal">
        <h1 style="font-size: 3rem; color: var(--gold); margin-bottom: 0;">EXCELLENT! / כל הכבוד!</h1>
        <h2 id="final-time"></h2>
        <button class="btn" onclick="location.reload()">PLAY AGAIN / שחק שוב</button>
    </div>

    <script>
        const database = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        let dragTarget = null, grabX, grabY, solved = 0, clock = 0, timerRef = null;

        function initSystem() {
            window.speechSynthesis.getVoices();
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
            renderLevels();
        }

        function playVoice(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function renderLevels() {
            const container = document.getElementById('lvl-btns');
            for(let i=1; i<=4; i++) {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = `LEVEL ${i} / שלב`;
                b.onclick = () => startLevel(i);
                container.appendChild(b);
            }
        }

        function startLevel(lvl) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-stats').style.display = 'flex';
            document.getElementById('instr').style.display = 'block';
            document.getElementById('game-board').style.display = 'grid';
            timerRef = setInterval(() => {
                clock++;
                const m = Math.floor(clock / 60).toString().padStart(2, '0');
                const s = (clock % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `TIME: ${m}:${s}`;
            }, 1000);

            const items = database[lvl];
            const flagDiv = document.getElementById('flag-col');
            const nameDiv = document.getElementById('name-col');

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const unit = document.createElement('div');
                unit.className = 'flag-unit';
                unit.dataset.country = d.n;
                unit.innerHTML = `
                    <div class="flag-card">${d.e}</div>
                    <button class="big-audio-btn">🔊</button>
                `;
                
                unit.querySelector('.big-audio-btn').addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    playVoice(d.n);
                });

                unit.querySelector('.flag-card').addEventListener('pointerdown', (e) => {
                    pickup(e, unit);
                });

                flagDiv.appendChild(unit);
            });

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const s = document.createElement('div');
                s.className = 'name-slot'; s.dataset.country = d.n;
                s.innerText = d.n;
                nameDiv.appendChild(s);
            });
        }

        function pickup(e, el) {
            dragTarget = el;
            dragTarget.style.transition = 'none';
            const r = dragTarget.getBoundingClientRect();
            grabX = e.clientX - r.left; grabY = e.clientY - r.top;
            dragTarget.style.position = 'fixed'; dragTarget.style.zIndex = '1000';
            dragTarget.style.pointerEvents = 'none';
            
            document.onpointermove = (ev) => {
                dragTarget.style.left = (ev.clientX - grabX) + 'px';
                dragTarget.style.top = (ev.clientY - grabY) + 'px';
            };

            document.onpointerup = (ev) => {
                const slots = document.getElementsByClassName('name-slot');
                let matched = false;
                const dropX = ev.clientX;
                const dropY = ev.clientY;

                for(let slot of slots) {
                    const rect = slot.getBoundingClientRect();
                    if(dropX > rect.left && dropX < rect.right && dropY > rect.top && dropY < rect.bottom) {
                        if(slot.dataset.country === dragTarget.dataset.country && !slot.classList.contains('correct')) {
                            slot.classList.add('correct');
                            slot.innerHTML = `<span style="font-size:2rem; margin-right:15px;">${dragTarget.querySelector('.flag-card').innerText}</span> ${slot.dataset.country}`;
                            dragTarget.remove();
                            solved++;
                            document.getElementById('score-display').innerText = `MATCHES: ${solved}/8`;
                            matched = true;
                            if(solved === 8) {
                                clearInterval(timerRef);
                                confetti();
                                document.getElementById('final-time').innerText = document.getElementById('timer-display').innerText;
                                document.getElementById('win-modal').style.display = 'flex';
                            }
                            break;
                        } else if (!slot.classList.contains('correct')) {
                            slot.classList.add('wrong');
                            setTimeout(() => slot.classList.remove('wrong'), 400);
                        }
                    }
                }
                if(!matched && dragTarget) {
                    dragTarget.style.transition = '0.3s';
                    dragTarget.style.position = 'relative';
                    dragTarget.style.left = '0'; dragTarget.style.top = '0';
                    dragTarget.style.pointerEvents = 'auto';
                }
                dragTarget = null; document.onpointermove = null; document.onpointerup = null;
            };
        }
    </script>
</body>
</html>
