<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matching Countries</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Assistant:wght@600;800&display=swap');

        :root {
            --map-bg: #e5e0d8; 
            --paper-dark: #0d1b2a; 
            --gold: #b8860b;
            --navy: #2c3e50;
        }

        * { box-sizing: border-box; }
        
        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            margin: 0; padding: 0;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(rgba(229, 224, 216, 0.88), rgba(229, 224, 216, 0.88)), 
                        url('https://www.transparenttextures.com/patterns/world-map.png'),
                        #e5e0d8;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center;
            touch-action: none;
        }

        /* START SCREEN */
        #unlock-screen {
            position: fixed; inset: 0; background: var(--navy); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .header-container {
            width: 100%; max-width: 800px; text-align: center; padding: 10px;
        }
        
        h1 { color: var(--navy); margin: 5px 0; font-size: 1.6rem; border-bottom: 3px solid var(--gold); display: inline-block; padding: 0 15px; }

        .instruction-box {
            background: rgba(255, 255, 255, 0.8);
            border: 2px dashed var(--gold);
            color: var(--navy); padding: 10px; border-radius: 8px;
            margin: 5px auto; max-width: 90%;
            font-weight: 800; font-size: 1.1rem; line-height: 1.4;
        }

        /* LEVEL BUTTONS AREA */
        #lvl-btns {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px;
        }

        .lvl-btn {
            background: var(--navy); color: white; border: none;
            padding: 12px 20px; border-radius: 10px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #1a252f;
            display: flex; flex-direction: column; align-items: center; min-width: 140px;
        }
        .lvl-btn span { font-size: 0.8rem; opacity: 0.9; margin-top: 2px; }

        #game-stats {
            display: none; width: 90%; max-width: 600px;
            justify-content: space-around; background: var(--navy);
            padding: 8px; border-radius: 30px; margin-bottom: 10px;
            color: white; font-size: 1.1rem; font-weight: bold;
        }

        #game-board {
            display: none; 
            grid-template-columns: 1fr 1.5fr; 
            gap: 12px; 
            width: 95%; 
            max-width: 800px; 
            height: 62vh; 
            padding: 5px;
        }

        .col { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }

        .flag-unit { display: flex; align-items: center; gap: 8px; height: 11%; }

        .flag-card {
            aspect-ratio: 3/2; height: 100%; 
            background: white; border-radius: 6px; border: 2px solid #555;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; cursor: grab; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .big-audio-btn {
            width: 42px; height: 42px; background: var(--gold);
            border-radius: 50%; border: none; color: white;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 3px 0 #7a5908;
        }

        .name-slot {
            height: 11%; width: 100%;
            background: var(--paper-dark); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem; text-transform: uppercase;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        .name-slot.correct { background: #27ae60 !important; }
        .name-slot.wrong { background: #c0392b; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .btn-main {
            background: var(--gold); color: white; border: none;
            padding: 15px 40px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #7a5908; font-family: 'Assistant';
        }

        #win-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="unlock-screen">
        <h1 style="color:white; border:none; font-size: 2.8rem; margin-bottom: 5px;">Matching Countries</h1>
        <h2 style="font-family: 'Assistant'; font-size: 2rem; margin-top: 0;">התאמת מדינות</h2>
        <button class="btn-main" onclick="initSystem()">START / התחל</button>
    </div>

    <div class="header-container" id="game-header" style="display:none;">
        <h1>Matching Countries / התאמת מדינות</h1>
        <div class="instruction-box">
            Drag the flag to the matching word. / גררו את הדגל למילה המתאימה.
        </div>
        <div id="lvl-btns"></div>
    </div>

    <div id="game-stats">
        <div id="timer-display">TIME: 00:00</div>
        <div id="score-display">MATCHES: 0/8</div>
    </div>

    <div id="game-board">
        <div class="col" id="flag-col"></div>
        <div class="col" id="name-col"></div>
    </div>

    <div id="win-modal">
        <h1 style="font-size: 3rem; color: var(--gold);">EXCELLENT! / כל הכבוד!</h1>
        <h2 id="final-time"></h2>
        <button class="btn-main" onclick="location.reload()">PLAY AGAIN / שחק שוב</button>
    </div>

    <script>
        const database = {
            1: [{e:"🇦🇷", n:"Argentina"}, {e:"🇦🇺", n:"Australia"}, {e:"🇧🇷", n:"Brazil"}, {e:"🇨🇦", n:"Canada"}, {e:"🇨🇴", n:"Colombia"}, {e:"🇲🇽", n:"Mexico"}, {e:"🇵🇦", n:"Panama"}, {e:"🇺🇸", n:"America"}],
            2: [{e:"🇮🇹", n:"Italy"}, {e:"🇧🇪", n:"Belgium"}, {e:"🇯🇵", n:"Japan"}, {e:"🇷🇺", n:"Russia"}, {e:"🇺🇦", n:"Ukraine"}, {e:"🇪🇹", n:"Ethiopia"}, {e:"🇬🇧", n:"England"}, {e:"🇩🇪", n:"Germany"}],
            3: [{e:"🇿🇦", n:"South Africa"}, {e:"🇭🇺", n:"Hungary"}, {e:"🇵🇱", n:"Poland"}, {e:"🇳🇴", n:"Norway"}, {e:"🇹🇭", n:"Thailand"}, {e:"🇸🇪", n:"Sweden"}, {e:"🇨🇳", n:"China"}, {e:"🇮🇪", n:"Ireland"}],
            4: [{e:"🇪🇬", n:"Egypt"}, {e:"🇬🇷", n:"Greece"}, {e:"🇨🇾", n:"Cyprus"}, {e:"🇫🇷", n:"France"}, {e:"🇮🇳", n:"India"}, {e:"🇨🇭", n:"Switzerland"}, {e:"🇳🇱", n:"Netherlands"}, {e:"🇱🇹", n:"Lithuania"}]
        };

        const hebLevels = ["שלב ראשון", "שלב שני", "שלב שלישי", "שלב רביעי"];
        const engLevels = ["Level One", "Level Two", "Level Three", "Level Four"];

        let dragTarget = null, grabX, grabY, solved = 0, clock = 0, timerRef = null;

        function initSystem() {
            // Audio Wake-up
            const dummy = new SpeechSynthesisUtterance(' ');
            window.speechSynthesis.speak(dummy);
            
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('game-header').style.display = 'block';
            renderLevels();
        }

        function playVoice(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function renderLevels() {
            const container = document.getElementById('lvl-btns');
            container.innerHTML = '';
            for(let i=0; i<4; i++) {
                const b = document.createElement('button');
                b.className = 'lvl-btn';
                b.innerHTML = `${engLevels[i]} <span>${hebLevels[i]}</span>`;
                b.onclick = () => {
                    // Re-unlock audio on button click to be safe
                    const dummy = new SpeechSynthesisUtterance(' ');
                    window.speechSynthesis.speak(dummy);
                    startLevel(i + 1);
                };
                container.appendChild(b);
            }
        }

        function startLevel(lvl) {
            solved = 0; clock = 0;
            if(timerRef) clearInterval(timerRef);
            
            document.getElementById('lvl-btns').style.display = 'none';
            document.getElementById('game-stats').style.display = 'flex';
            document.getElementById('game-board').style.display = 'grid';
            document.getElementById('score-display').innerText = `MATCHES: 0/8`;
            
            timerRef = setInterval(() => {
                clock++;
                const m = Math.floor(clock / 60).toString().padStart(2, '0');
                const s = (clock % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `TIME: ${m}:${s}`;
            }, 1000);

            const items = database[lvl];
            const flagDiv = document.getElementById('flag-col');
            const nameDiv = document.getElementById('name-col');
            flagDiv.innerHTML = ''; nameDiv.innerHTML = '';

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const unit = document.createElement('div');
                unit.className = 'flag-unit';
                unit.dataset.country = d.n;
                unit.innerHTML = `
                    <div class="flag-card">${d.e}</div>
                    <button class="big-audio-btn">🔊</button>
                `;
                unit.querySelector('.big-audio-btn').addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    playVoice(d.n);
                });
                unit.querySelector('.flag-card').addEventListener('pointerdown', (e) => pickup(e, unit));
                flagDiv.appendChild(unit);
            });

            [...items].sort(()=>Math.random()-0.5).forEach(d => {
                const s = document.createElement('div');
                s.className = 'name-slot'; s.dataset.country = d.n;
                s.innerText = d.n;
                nameDiv.appendChild(s);
            });
        }

        function pickup(e, el) {
            dragTarget = el;
            dragTarget.style.transition = 'none';
            const r = dragTarget.getBoundingClientRect();
            grabX = e.clientX - r.left; grabY = e.clientY - r.top;
            
            dragTarget.style.position = 'fixed'; 
            dragTarget.style.zIndex = '1000';
            dragTarget.style.width = r.width + 'px';
            dragTarget.style.pointerEvents = 'none';
            
            document.onpointermove = (ev) => {
                dragTarget.style.left = (ev.clientX - grabX) + 'px';
                dragTarget.style.top = (ev.clientY - grabY) + 'px';
            };

            document.onpointerup = (ev) => {
                const slots = document.getElementsByClassName('name-slot');
                let matched = false;
                for(let slot of slots) {
                    const rect = slot.getBoundingClientRect();
                    if(ev.clientX > rect.left && ev.clientX < rect.right && ev.clientY > rect.top && ev.clientY < rect.bottom) {
                        if(slot.dataset.country === dragTarget.dataset.country && !slot.classList.contains('correct')) {
                            slot.classList.add('correct');
                            slot.innerHTML = `<span>${dragTarget.querySelector('.flag-card').innerText}</span> ${slot.dataset.country}`;
                            dragTarget.remove();
                            solved++;
                            document.getElementById('score-display').innerText = `MATCHES: ${solved}/8`;
                            matched = true;
                            if(solved === 8) {
                                clearInterval(timerRef);
                                confetti();
                                document.getElementById('final-time').innerText = document.getElementById('timer-display').innerText;
                                document.getElementById('win-modal').style.display = 'flex';
                            }
                            break;
                        } else {
                            slot.classList.add('wrong');
                            setTimeout(() => slot.classList.remove('wrong'), 400);
                        }
                    }
                }
                if(!matched && dragTarget) {
                    dragTarget.style.transition = '0.3s';
                    dragTarget.style.position = 'relative';
                    dragTarget.style.left = '0'; dragTarget.style.top = '0';
                    dragTarget.style.pointerEvents = 'auto';
                }
                dragTarget = null; document.onpointermove = null; document.onpointerup = null;
            };
        }
    </script>
</body>
</html>
